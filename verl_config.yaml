# ============================================================
# VERL GRPO + EpiCaR Training Configuration
# ============================================================
# Hardware: 2x A100 80GB
# Model: Qwen/Qwen3-4B-Base (~8GB bf16)
# ============================================================

data:
  train_files: /mnt/chatbot30TB/jewonyeom/verl_qwen3/verl/data/math/train.parquet
  val_files: /mnt/chatbot30TB/jewonyeom/verl_qwen3/verl/data/math/test.parquet
  train_batch_size: 64        # batch_size(8) * group_size(8)
  max_prompt_length: 512
  max_response_length: 2048
  filter_overlong_prompts: true

actor_rollout_ref:
  model:
    path: Qwen/Qwen3-4B-Base
    override_config:
      attn_implementation: sdpa       # flash-attn 미설치 → PyTorch SDPA
    enable_gradient_checkpointing: true

  actor:
    strategy: fsdp
    optim:
      lr: 1.0e-6
      lr_warmup_steps_ratio: 0.05
      weight_decay: 0.01
      total_training_steps: -1
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 16  # 2 GPUs → 16 per GPU
    ppo_epochs: 1
    clip_ratio: 0.2
    entropy_coeff: 0.0
    grad_clip: 1.0
    fsdp_config:
      wrap_policy: size_based
      min_num_params: 1.0e+7
      compute_dtype: bf16

  rollout:
    name: vllm
    temperature: 0.7
    top_p: 1.0
    n: 8                             # group size for GRPO
    gpu_memory_utilization: 0.45
    tensor_model_parallel_size: 1
    max_num_batched_tokens: 8192

  ref:
    fsdp_config:
      wrap_policy: size_based
      min_num_params: 1.0e+7
      param_offload: true             # ref model → CPU offload (save GPU memory)
      compute_dtype: bf16

algorithm:
  kl_ctrl:
    type: fixed
    kl_coef: 0.01
  adv_estimator: grpo
  grpo_config:
    baseline: mean

reward_model:
  reward_fn: reward_fn.compute_score
  reward_fn_key: data_source

trainer:
  total_epochs: 3
  save_freq: 100
  test_freq: 50
  project_name: grpo-epicar
  experiment_name: qwen3_4b_grpo_epicar_verl
  logger:
    - wandb
  default_local_dir: ./outputs_grpo_epicar
  default_hdfs_dir: null
  n_gpus_per_node: 2                  # 2x A100
  nnodes: 1
